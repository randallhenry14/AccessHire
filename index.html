<!DOCTYPE html>
<html>
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}

.logo-co img{width:100%;height:100%;object-fit:cover}
.av{border-radius:50%;object-fit:cover;border:2px solid var(--tan);flex-shrink:0}

.toast{position:fixed;top:70px;right:16px;background:var(--bark);color:var(--wheat);padding:12px 16px;border-radius:var(--r);font-size:13px;z-index:9999;box-shadow:var(--sha2);display:none;max-width:320px;border-left:4px solid var(--tan)}

.hero-gl{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(160,82,45,.25) 0%,transparent 70%);pointer-events:none}
.hero-2{background:#1a0a02;display:flex;align-items:stretch;min-height:320px;overflow:hidden}
.hero-3{background:var(--mahog);padding:64px 28px;text-align:center;position:relative;overflow:hidden}
.h-title{font-size:46px;font-weight:800;color:var(--wheat);line-height:1.08;margin-bottom:12px;position:relative}
.h-title em{color:var(--tan);font-style:normal}
.h-sub{font-size:16px;color:rgba(222,184,135,.75);margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto;position:relative;line-height:1.7}
.h-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative}
.h-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(198,134,66,.2);border:1px solid rgba(198,134,66,.35);color:var(--wheat);padding:7px 16px;border-radius:100px;font-size:12px;font-weight:700;margin-bottom:20px;position:relative}
/* PILLARS */
.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.pillar-card{background:#fff;border-radius:var(--r2);padding:26px 20px;text-align:center;border:1px solid var(--sand);box-shadow:var(--sha)}
.pillar-icon{width:64px;height:64px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
/* SOCIAL FOOTER */
.soc-footer{background:var(--bark);padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:18px}
.soc-row{display:flex;align-items:center;gap:16px}
.soc-lnk{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:8px;background:rgba(198,134,66,.15);border:1px solid rgba(198,134,66,.25);cursor:pointer;transition:.2s}
.soc-lnk:hover{background:rgba(198,134,66,.3)}
.soc-div{width:100%;max-width:560px;height:1px;background:rgba(222,184,135,.15)}

@media(max-width:700px){.sb-layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.frow{grid-template-columns:1fr}.frow3{grid-template-columns:1fr}.h-title{font-size:30px}.pillars{grid-template-columns:1fr}}
</style>

<div id="nav">
  <div class="logo" onclick="showPage('home')">

    </svg>
    <span class="logo-txt">Access<span>Hire</span></span>

</div>

<div id="modal-root"></div>

<script>
var ST={user:null,page:'home',heroTpl:0,jobs:[],savedIds:[],archivedIds:[],appliedApps:[],invitations:[],interviews:[],dashTab:'jobs',jobSubtab:'browse',settingsTab:'profile',jobFilters:{wm:[],jt:[]}};
var PHYS=['Sedentary (sitting)','Light lifting <10 lbs','Medium lifting 11-50 lbs','Heavy lifting 51-100 lbs','Very heavy 100+ lbs','Standing extended periods','Walking uneven surfaces','Climbing stairs/ladders','Repetitive hand motions','Operating machinery','Outdoor/field work','Visual acuity required'];
var WMODES=['Remote','Hybrid','On-site'],JTYPES=['Full-time','Part-time','Contract','Temporary','Internship','Volunteer'];
var EDULS=["High School / GED","Associate's","Bachelor's","Master's","Doctoral","Professional","Bootcamp","Trade/Vocational"];
var STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC','Remote'];
var SKLVL=['Beginner','Intermediate','Advanced','Expert'];
var BRANCHES=['Army','Navy','Air Force','Marine Corps','Coast Guard','Space Force','National Guard','Reserves','National Guard'];
var LANGS=['English','Spanish','French','German','Mandarin','Arabic','Portuguese','Japanese','Korean','Hindi','Italian','Russian'];
var HEROS=[{name:'Warm Minimal',desc:'Classic texture'},{name:'Bold Split',desc:'Editorial two-tone'},{name:'Organic Warmth',desc:'Radial depth'}];

// IndexedDB setup
var db;
function initDB() {
  return new Promise((resolve, reject) => {
    var request = indexedDB.open('AccessHireDB', 1);
    request.onupgradeneeded = function(event) {
      db = event.target.result;
      if (!db.objectStoreNames.contains('data')) {
        db.createObjectStore('data');
      }
      if (!db.objectStoreNames.contains('users')) {
        db.createObjectStore('users', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('jobs')) {
        db.createObjectStore('jobs', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('applications')) {
        db.createObjectStore('applications', { keyPath: 'id' });
      }
    };
    request.onsuccess = function(event) {
      db = event.target.result;
      resolve();
    };
    request.onerror = function(event) {
      reject(event);
    };
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([store], 'readonly');
    var objectStore = transaction.objectStore(store);
    var request = objectStore.get(key);
    request.onsuccess = function(event) {
      resolve(request.result);
    };
    request.onerror = function(event) {
      reject(event);
    };
  });
}

function dbSet(store, key, value) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([store], 'readwrite');
    var objectStore = transaction.objectStore(store);
    var request = objectStore.put(value, key);
    request.onsuccess = function(event) {
      resolve();
    };
    request.onerror = function(event) {
      reject(event);
    };
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    var transaction = db.transaction([store], 'readonly');
    var objectStore = transaction.objectStore(store);
    var request = objectStore.getAll();
    request.onsuccess = function(event) {
      resolve(request.result);
    };
    request.onerror = function(event) {
      reject(event);
    };
  });
}

// Password hashing
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function sGet(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch(e){return null}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';t.style.borderLeftColor=type==='success'?'#5C8A3C':type==='error'?'#C0392B':'#C68642';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none'},3200)}
function uid(){return '_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtDate(ts){return new Date(ts).toLocaleDateString()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(n){return(n||'?').split(' ').map(function(w){return w[0]}).slice(0,2).join('').toUpperCase()}
function pwStr(pw){if(!pw)return{s:0,l:'',c:''};var s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;var ls=[{l:'Too short',c:'#c0392b'},{l:'Weak',c:'#e67e22'},{l:'Fair',c:'#f39c12'},{l:'Good',c:'#27ae60'},{l:'Strong',c:'#16a085'},{l:'Very strong',c:'#2980b9'}];return Object.assign({s:s},ls[Math.min(s,5)])}
function avHTML(url,name,sz){sz=sz||36;if(url)return '<img src="'+url+'" class="av" style="width:'+sz+'px;height:'+sz+'px">';var ini=initials(name);var fs=Math.round(sz*.35);return '<div class="av-ph" style="width:'+sz+'px;height:'+sz+'px;font-size:'+fs+'px">'+ini+'</div>'}

async function boot(){
  await initDB();
  ST.user = await dbGet('data', 'user');
  ST.jobs = await dbGet('data', 'jobs') || [];
  if(ST.user&&ST.user.role==='applicant'){ST.savedIds=await dbGet('data','saved_'+ST.user.id)||[];ST.archivedIds=await dbGet('data','arch_'+ST.user.id)||[];ST.appliedApps=await dbGet('data','applied_'+ST.user.id)||[];ST.invitations=await dbGet('data','inv_'+ST.user.id)||[];ST.interviews=await dbGet('data','intv_'+ST.user.id)||[]}
  render();
}
function render(){renderNav();renderPage()}
function go(pg){ST.page=pg;render()}
function logout(){ST.user=null;sSet('ah_user',null);ST.page='home';toast('Signed out.','info');render()}

function renderNav(){
  var el=document.getElementById('nav-links'),u=ST.user,html='';
  if(u){
    if(u.role==='applicant'){html+='<button class="nl'+(ST.page==='jobs'?' act':'')+'" onclick="go(\'jobs\')">Jobs</button><button class="nl'+(ST.page==='settings'?' act':'')+'" onclick="go(\'settings\')">Profile</button>';}
    else{html+='<button class="nl'+(ST.page==='dashboard'?' act':'')+'" onclick="go(\'dashboard\')">Dashboard</button><button class="nl'+(ST.page==='settings'?' act':'')+'" onclick="go(\'settings\')">Settings</button>';}
    html+=avHTML(u.avatarUrl,u.name||u.email,32)+'<button class="btn btn-gh btn-sm" onclick="logout()">Sign Out</button>';
  }else{html+='<button class="nl" onclick="go(\'jobs\')">Browse Jobs</button><button class="btn btn-gh btn-sm" onclick="showAuth(\'login\')">Sign In</button><button class="btn btn-g btn-sm" onclick="showAuth(\'signup-applicant\')">Get Started</button>';}
  el.innerHTML=html;
}

function renderPage(){
  var el=document.getElementById('app');

  else if(ST.page==='dashboard')el.innerHTML=renderDashboard();
  else if(ST.page==='settings')el.innerHTML=renderSettings();
}

/* ── HOME ── */
function renderHome(){
  var tplPicker='<div style="background:var(--parch);padding:14px 22px;border-bottom:1px solid var(--sand)"><div style="max-width:1100px;margin:0 auto"><div style="font-size:11px;font-weight:700;color:var(--cara);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Homepage Style</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+HEROS.map(function(t,i){return '<button class="btn '+(i===ST.heroTpl?'btn-p':'btn-gh')+' btn-sm" onclick="ST.heroTpl='+i+';renderPage()">'+t.name+' — '+t.desc+'</button>'}).join('')+'</div></div></div>';
  var icons=pillarIcons();
  var pillars='<div class="page" style="padding-top:28px;padding-bottom:8px"><div class="pillars">'+[{t:'ADA-Verified Employers',d:'Every employer attests to ADA compliance and equal opportunity employment.'},{t:'Full Disclosure Required',d:'All physical demands, travel requirements, and accommodations listed on every job.'},{t:'Privacy Protected',d:'Disability disclosure is always optional. Retaliation is strictly prohibited by law.'}].map(function(f,i){return '<div class="pillar-card"><div class="pillar-icon">'+icons[i]+'</div><div style="font-weight:700;font-size:15px;margin-bottom:8px;color:var(--bark)">'+f.t+'</div><div style="font-size:13px;color:var(--cara);line-height:1.65">'+f.d+'</div></div>'}).join('')+'</div></div>';
  var featJobs=ST.jobs.filter(function(j){return j.status==='active'}).slice(0,5);
  var featured=featJobs.length?'<div class="page" style="padding-top:8px"><div style="font-size:20px;font-weight:700;color:var(--bark);margin-bottom:16px">Featured Opportunities</div><div style="display:flex;flex-direction:column;gap:12px">'+featJobs.map(jCardHTML).join('')+'</div><div style="text-align:center;margin-top:18px"><button class="btn btn-o" onclick="go(\'jobs\')">View All Jobs &rarr;</button></div></div>':'<div class="page" style="padding-top:0"><div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128188;</div><div class="empty-t">No jobs posted yet</div><p style="margin-top:5px;font-size:13px">'+(ST.user&&ST.user.role==='employer'?'<button class="btn btn-p" onclick="go(\'dashboard\')">Post Your First Job</button>':'Sign up as an employer to post jobs.')+'</p></div></div>';
  return renderHeroContent(ST.heroTpl)+tplPicker+pillars+featured+renderSocialFooter();

/* ── JOB CARD ── */
function jCardHTML(j,opts){
  opts=opts||{};
  var acts='';
  if(opts.saved){acts='<button class="btn btn-d btn-sm" onclick="event.stopPropagation();unsaveJob(\''+j.id+'\')">Remove</button><button class="btn btn-p btn-sm" onclick="event.stopPropagation();openJobDetail(\''+j.id+'\')">Apply</button>';}
  else if(opts.browse){var isSaved=ST.savedIds.indexOf(j.id)>=0;acts='<button class="btn btn-gh btn-sm" onclick="event.stopPropagation();toggleSave(\''+j.id+'\')">'+(isSaved?'Saved':'Save')+'</button><button class="btn btn-gh btn-sm" onclick="event.stopPropagation();archiveJob(\''+j.id+'\')">Archive</button><button class="btn btn-p btn-sm" onclick="event.stopPropagation();openJobDetail(\''+j.id+'\')">View</button>';}
  else{acts='<button class="btn btn-p btn-sm" onclick="event.stopPropagation();openJobDetail(\''+j.id+'\')">View &amp; Apply</button>';}
  var logo=j.coLogo?'<img src="'+j.coLogo+'" style="width:100%;height:100%;object-fit:cover">':'&#127968;';
  return '<div class="jc"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px"><div class="logo-co">'+logo+'</div><div><div class="jc-t">'+esc(j.title)+'</div><div class="jc-c">'+esc(j.company)+' &middot; '+esc(j.location)+'</div></div></div><span class="ada-s">&#9855; ADA</span></div><div style="font-size:13px;color:var(--cara);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">'+esc(j.desc)+'</div><div class="jc-m"><span class="badge b-br">'+esc(j.wm)+'</span><span class="badge b-tn">'+esc(j.jt)+'</span>'+(j.sal?'<span class="badge b-gr">'+esc(j.sal)+'</span>':'')+(j.travel?'<span class="badge b-gd">&#9992; Travel</span>':'')+'</div><div class="jc-f"><span class="jc-d">'+fmtDate(j.createdAt)+'</span><div style="display:flex;gap:6px">'+acts+'</div></div></div>';
}

/* ── JOBS PAGE ── */
function renderJobs(){
  var isApp=ST.user&&ST.user.role==='applicant';
  var search='<div style="background:#fff;border-radius:var(--r2);padding:12px;box-shadow:var(--sha);margin-bottom:18px;display:flex;gap:8px"><input class="fi" id="jsearch" placeholder="Search jobs, companies, locations..." style="flex:1" oninput="filterJobs()"><button class="btn btn-p" onclick="filterJobs()">Search</button></div>';
  if(!isApp){var aJ=applyFilters(ST.jobs.filter(function(j){return j.status==='active'}));return '<div class="page"><div style="font-size:20px;font-weight:700;margin-bottom:6px;color:var(--bark)">ADA-Compliant Job Board</div><div style="font-size:13px;color:var(--cara);margin-bottom:18px">All postings include full accessibility disclosures</div>'+search+'<div class="sb-layout"><div>'+renderFilters()+'</div><div id="jlist">'+renderJobList(aJ,{})+'</div></div></div>';}
  var stabs=['browse','saved','applied','archived','invitations','interviews'];
  var slbls=['Browse','Saved ('+ST.savedIds.length+')','Applied ('+ST.appliedApps.length+')','Archived ('+ST.archivedIds.length+')','Invitations ('+ST.invitations.filter(function(i){return i.status==='pending'}).length+')','Interviews ('+ST.interviews.length+')'];
  var stHtml='<div class="stabs">'+stabs.map(function(s,i){return '<button class="stab'+(ST.jobSubtab===s?' act':'')+'" onclick="ST.jobSubtab=\''+s+'\';renderPage()">'+slbls[i]+'</button>'}).join('')+'</div>';
  var content='';
  if(ST.jobSubtab==='browse'){var aJ2=applyFilters(ST.jobs.filter(function(j){return j.status==='active'&&ST.archivedIds.indexOf(j.id)<0}));content='<div class="sb-layout"><div>'+renderFilters()+'</div><div id="jlist">'+renderJobList(aJ2,{browse:true})+'</div></div>';}
  else if(ST.jobSubtab==='saved'){var sv=ST.jobs.filter(function(j){return ST.savedIds.indexOf(j.id)>=0});content=sv.length?'<div style="display:flex;flex-direction:column;gap:10px">'+sv.map(function(j){return jCardHTML(j,{saved:true})}).join('')+'</div>':'<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128212;</div><div class="empty-t">No saved jobs</div></div>';}
  else if(ST.jobSubtab==='applied')content=renderApplied();
  else if(ST.jobSubtab==='archived'){var arc=ST.jobs.filter(function(j){return ST.archivedIds.indexOf(j.id)>=0});content=arc.length?'<div style="display:flex;flex-direction:column;gap:10px">'+arc.map(function(j){return '<div class="jc" style="opacity:.75;background:var(--parch);cursor:default"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px"><div class="logo-co">&#127968;</div><div><div class="jc-t">'+esc(j.title)+'</div><div class="jc-c">'+esc(j.company)+' &middot; '+esc(j.location)+'</div></div></div><span class="ada-s">&#9855; ADA</span></div><div class="jc-f"><span class="jc-d">Archived</span><div style="display:flex;gap:6px"><button class="btn btn-gh btn-sm" onclick="unarchiveJob(\''+j.id+'\')">Unarchive</button><button class="btn btn-p btn-sm" onclick="openJobDetail(\''+j.id+'\')">View</button></div></div></div>'}).join('')+'</div>':'<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128230;</div><div class="empty-t">No archived jobs</div></div>';}
  else if(ST.jobSubtab==='invitations')content=renderInvitations();
  else if(ST.jobSubtab==='interviews')content=renderInterviews();
  return '<div class="page"><div style="font-size:20px;font-weight:700;margin-bottom:6px;color:var(--bark)">Jobs</div>'+search+stHtml+content+'</div>';
}
function renderFilters(){return '<div class="sb-box"><div class="sb-tt">Work Mode</div>'+WMODES.map(function(m){return '<label class="sb-opt"><input type="checkbox" '+(ST.jobFilters.wm.indexOf(m)>=0?'checked':'')+' onchange="toggleFilter(\'wm\',\''+m+'\')" />'+m+'</label>'}).join('')+'</div><div class="sb-box"><div class="sb-tt">Job Type</div>'+JTYPES.map(function(t){return '<label class="sb-opt"><input type="checkbox" '+(ST.jobFilters.jt.indexOf(t)>=0?'checked':'')+' onchange="toggleFilter(\'jt\',\''+t+'\')" />'+t+'</label>'}).join('')+'</div>';}
function applyFilters(jobs){var q=(document.getElementById('jsearch')||{}).value||'';q=q.toLowerCase();return jobs.filter(function(j){var mq=!q||(j.title||'').toLowerCase().includes(q)||(j.company||'').toLowerCase().includes(q)||(j.location||'').toLowerCase().includes(q);var mw=!ST.jobFilters.wm.length||ST.jobFilters.wm.indexOf(j.wm)>=0;var mj=!ST.jobFilters.jt.length||ST.jobFilters.jt.indexOf(j.jt)>=0;return mq&&mw&&mj});}
function renderJobList(jobs,opts){if(!jobs.length)return '<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128269;</div><div class="empty-t">No jobs found</div><p>Adjust search or filters.</p></div>';return '<div style="display:flex;flex-direction:column;gap:10px">'+jobs.map(function(j){return jCardHTML(j,opts)}).join('')+'</div>';}
function renderApplied(){if(!ST.appliedApps.length)return '<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128196;</div><div class="empty-t">No applications yet</div></div>';var sc={applied:'b-br',reviewing:'b-gd',interview:'b-tn',accepted:'b-gr',rejected:'b-rd'};return '<div style="display:flex;flex-direction:column;gap:10px">'+ST.appliedApps.map(function(a){return '<div class="card card-sm"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px"><div style="flex:1"><div style="font-weight:700;font-size:15px;color:var(--bark)">'+esc(a.jobTitle)+'</div><div style="font-size:13px;color:var(--cara)">'+esc(a.company)+'</div><div style="font-size:12px;color:var(--cara);margin-top:5px">Applied '+fmtDate(a.appliedAt)+(a.covLetter?' &middot; Cover letter':'')+'</div></div><div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end"><span class="badge '+(sc[a.status]||'b-sl')+'">'+a.status+'</span><button class="btn btn-d btn-sm" onclick="withdrawApp(\''+a.jobId+'\')">Withdraw</button></div></div></div>'}).join('')+'</div>';}
function renderInvitations(){if(!ST.invitations.length)return '<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#9993;</div><div class="empty-t">No invitations yet</div></div>';return '<div style="display:flex;flex-direction:column;gap:10px">'+ST.invitations.map(function(inv){var btns=inv.status==='pending'?'<button class="btn btn-s btn-sm" onclick="respondInv(\''+inv.id+'\',true)">Accept</button><button class="btn btn-d btn-sm" onclick="respondInv(\''+inv.id+'\',false)">Decline</button>':'<span class="badge '+(inv.status==='accepted'?'b-gr':'b-rd')+'">'+inv.status+'</span>';return '<div class="invite-c"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px"><div style="flex:1"><div style="font-weight:700;color:var(--bark);font-size:15px">'+esc(inv.empName)+' <span style="font-weight:400;color:var(--cara)">from</span> '+esc(inv.company)+'</div><div style="font-size:13px;color:var(--cara);margin-top:3px">Re: <strong>'+esc(inv.jobTitle)+'</strong></div>'+(inv.msg?'<div style="margin-top:8px;background:var(--parch);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--bark)">&ldquo;'+esc(inv.msg)+'&rdquo;</div>':'')+'<div style="font-size:11px;color:var(--cara);margin-top:7px">'+fmtDate(inv.sentAt)+'</div></div><div style="display:flex;flex-direction:column;gap:5px">'+btns+'</div></div></div>'}).join('')+'</div>';}
function renderInterviews(){if(!ST.interviews.length)return '<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128197;</div><div class="empty-t">No interviews scheduled</div></div>';return '<div style="display:flex;flex-direction:column;gap:10px">'+ST.interviews.map(function(iv){return '<div class="intv-c"><div style="display:flex;align-items:flex-start;justify-content:space-between"><div><div style="font-weight:700;font-size:15px;color:var(--bark);margin-bottom:2px">Interview: '+esc(iv.jobTitle)+'</div><div style="font-size:13px;color:var(--cara);margin-bottom:10px">'+esc(iv.company)+'</div><div style="display:flex;gap:20px;flex-wrap:wrap"><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--cara)">Date &amp; Time</div><div style="font-weight:700;color:var(--bark)">'+esc(iv.date)+' at '+esc(iv.time)+'</div></div><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--cara)">Format</div><div style="font-weight:700;color:var(--bark)">'+esc(iv.fmt)+'</div></div>'+(iv.loc?'<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--cara)">Location</div><div style="font-weight:700;color:var(--bark)">'+esc(iv.loc)+'</div></div>':'')+'</div>'+(iv.notes?'<div style="font-size:13px;color:var(--cara);margin-top:8px">'+esc(iv.notes)+'</div>':'')+'</div><span class="badge b-gr">Scheduled</span></div></div>'}).join('')+'</div>';}
function filterJobs(){var jl=document.getElementById('jlist');if(!jl)return;var isApp=ST.user&&ST.user.role==='applicant';var aJ=ST.jobs.filter(function(j){return j.status==='active'&&(!isApp||ST.archivedIds.indexOf(j.id)<0)});jl.innerHTML=renderJobList(applyFilters(aJ),isApp?{browse:true}:{});}
function toggleFilter(k,v){var arr=ST.jobFilters[k];var i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);renderPage()}
function toggleSave(id){var i=ST.savedIds.indexOf(id);if(i>=0)ST.savedIds.splice(i,1);else ST.savedIds.push(id);sSet('ah_saved_'+ST.user.id,ST.savedIds);toast(i>=0?'Removed from saved.':'Job saved!',i>=0?'info':'success');renderPage()}
function unsaveJob(id){var i=ST.savedIds.indexOf(id);if(i>=0)ST.savedIds.splice(i,1);sSet('ah_saved_'+ST.user.id,ST.savedIds);toast('Removed.','info');renderPage()}
function archiveJob(id){if(ST.archivedIds.indexOf(id)<0)ST.archivedIds.push(id);sSet('ah_arch_'+ST.user.id,ST.archivedIds);toast('Archived.','info');renderPage()}
function unarchiveJob(id){var i=ST.archivedIds.indexOf(id);if(i>=0)ST.archivedIds.splice(i,1);sSet('ah_arch_'+ST.user.id,ST.archivedIds);toast('Unarchived.','info');renderPage()}
function withdrawApp(jobId){if(!confirm('Withdraw this application?'))return;ST.appliedApps=ST.appliedApps.filter(function(a){return a.jobId!==jobId});sSet('ah_applied_'+ST.user.id,ST.appliedApps);toast('Application withdrawn.','info');renderPage()}
function respondInv(id,accept){var inv=ST.invitations.find(function(i){return i.id===id});if(inv)inv.status=accept?'accepted':'rejected';sSet('ah_inv_'+ST.user.id,ST.invitations);toast(accept?'Invitation accepted!':'Invitation declined.',accept?'success':'info');renderPage()}

<div style="font-size:13px;color:var(--bark)">'+esc(j.accomm||'Contact employer')+'</div></div><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--cara);margin-bottom:6px">Contact</div><div style="font-size:13px;color:var(--bark)">'+esc(j.accommEmail||'—')+'</div></div></div></div>'+applySection+'</div>');
}
function showApplyForm(jid){var a=document.getElementById('apply-area');if(!a)return;a.innerHTML='<div class="fg"><label class="fl">Cover Letter <span style="font-weight:400;color:var(--cara)">(optional)</span></label><textarea class="fi ftxt" id="cv-letter" rows="4" placeholder="Why are you a great fit?"></textarea></div><div style="display:flex;gap:8px"><button class="btn btn-p" onclick="submitApp(\''+jid+'\')">Submit Application</button><button class="btn btn-gh" onclick="document.getElementById(\'apply-area\').innerHTML=\'<button class=&quot;btn btn-g btn-lg&quot; onclick=&quot;showApplyForm(&bsol;&quot;'+jid+'&bsol;&quot;)&quot;>Apply Now</button>\'">Cancel</button></div>';}
function submitApp(jid){var j=ST.jobs.find(function(x){return x.id===jid});if(!j||!ST.user)return;var cl=(document.getElementById('cv-letter')||{}).value||'';var app={jobId:jid,jobTitle:j.title,company:j.company,covLetter:cl,status:'applied',appliedAt:Date.now()};ST.appliedApps.push(app);sSet('ah_applied_'+ST.user.id,ST.appliedApps);var ea=sGet('ah_eapps_'+j.empId)||[];ea.push(Object.assign({},app,{appId:uid(),applicantId:ST.user.id,applicantName:ST.user.name||ST.user.email,applicantEmail:ST.user.email}));sSet('ah_eapps_'+j.empId,ea);closeModal();toast('Application submitted!','success');renderPage();}

  else{content=myApps.length?'<div style="display:flex;flex-direction:column;gap:10px">'+myApps.map(function(a){var sc={applied:'b-br',reviewing:'b-gd',interview:'b-tn',accepted:'b-gr',rejected:'b-rd'};return '<div class="card card-sm"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px"><div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--bark)">'+esc(a.applicantName)+'</div><div style="font-size:12px;color:var(--cara)">'+esc(a.applicantEmail)+'</div><div style="font-size:12px;color:var(--cara);margin-top:4px">For: <strong>'+esc(a.jobTitle)+'</strong> &middot; '+fmtDate(a.appliedAt)+'</div>'+(a.covLetter?'<div style="margin-top:8px;background:var(--parch);border-radius:7px;padding:9px 12px;font-size:13px;max-width:500px">&ldquo;'+esc(a.covLetter)+'&rdquo;</div>':'')+'<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap"><button class="btn btn-gh btn-sm" onclick="viewApplicantProfile(\''+a.applicantId+'\')">View Profile</button><button class="btn btn-o btn-sm" onclick="openInviteModal(\''+a.applicantId+'\',\''+esc(a.applicantName)+'\',\''+esc(a.jobTitle)+'\')">Send Invite</button><button class="btn btn-s btn-sm" onclick="openScheduleModal(\''+a.applicantId+'\',\''+esc(a.jobTitle)+'\')">Schedule Interview</button></div></div><div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end"><span class="badge '+(sc[a.status]||'b-sl')+'">'+a.status+'</span><select class="fi fsel" style="width:150px;font-size:12px;padding:5px 28px 5px 8px" onchange="updateAppStatus(\''+a.applicantId+'\',\''+a.jobId+'\',this.value)"><option '+(a.status==='applied'?'selected':'')+'>applied</option><option '+(a.status==='reviewing'?'selected':'')+'>reviewing</option><option '+(a.status==='interview'?'selected':'')+'>interview</option><option '+(a.status==='accepted'?'selected':'')+'>accepted</option><option '+(a.status==='rejected'?'selected':'')+'>rejected</option></select></div></div></div>'}).join('')+'</div>' function toggleJobStatus(jid){var j=ST.jobs.find(function(x){return x.id===jid});if(!j)return;j.status=j.status==='active'?'paused':'active';sSet('ah_jobs',ST.jobs);toast(j.status==='active'?'Job reactivated.':'Job paused.','info');renderPage()}
function deleteJob(jid){if(!confirm('Delete this job?'))return;ST.jobs=ST.jobs.filter(function(j){return j.id!==jid});sSet('ah_jobs',ST.jobs);toast('Deleted.','info');renderPage()}
function updateAppStatus(appId,jobId,status){var ea=sGet('ah_eapps_'+ST.user.id)||[];var a=ea.find(function(x){return x.applicantId===appId&&x.jobId===jobId});if(a)a.status=status;sSet('ah_eapps_'+ST.user.id,ea);var aa=sGet('ah_applied_'+appId)||[];var a2=aa.find(function(x){return x.jobId===jobId});if(a2){a2.status=status;sSet('ah_applied_'+appId,aa)}toast('Updated.','success')}

v style="font-size:12px;color:var(--cara)">'+esc(e.lvl||'')+(e.field?' · '+esc(e.field):'')+(e.yr?' · '+esc(e.yr):'')+'</div></div>'}).join('')+'</div>':'')+'</div>');}
function openInviteModal(appId,appName,jobTitle){showModal('md-sm','<div class="md-h"><div class="md-t">Send Invitation</div><button class="md-x" onclick="closeModal()">&times;</button></div><div class="md-b"><div class="al al-br">Inviting <strong>'+esc(appName)+'</strong> re: <strong>'+esc(jobTitle)+'</strong></div><div class="fg"><label class="fl">Message (optional)</label><textarea class="fi ftxt" id="inv-msg" rows="4" placeholder="Hi! We would love to connect..."></textarea></div><div style="display:flex;gap:8px"><button class="btn btn-p" onclick="sendInvitation(\''+appId+'\',\''+esc(appName)+'\',\''+esc(jobTitle)+'\')">Send</button><button class="btn btn-gh" onclick="closeModal()">Cancel</button></div></div>');}
function sendInvitation(appId,appName,jobTitle){var msg=(document.getElementById('inv-msg')||{}).value||'';var u=ST.user;var inv={id:uid(),empId:u.id,empName:u.name||u.email,company:u.companyName||'',jobTitle:jobTitle,msg:msg,status:'pending',sentAt:Date.now()};var ex=sGet('ah_inv_'+appId)||[];ex.push(inv);sSet('ah_inv_'+appId,ex);closeModal();toast('Invitation sent!','success');}

function doSchedule(appId,jobTitle){var date=(document.getElementById('iv-date')||{}).value;var time=(document.getElementById('iv-time')||{}).value;if(!date||!time){toast('Date and time required.','error');return;}var iv={id:uid(),jobTitle:jobTitle,company:ST.user.companyName||'',date:date,time:time,fmt:(document.getElementById('iv-fmt')||{}).value||'Video Call',loc:(document.getElementById('iv-loc')||{}).value||'',notes:(document.getElementById('iv-notes')||{}).value||''};var ex=sGet('ah_intv_'+appId)||[];ex.push(iv);sSet('ah_intv_'+appId,ex);closeModal();toast('Interview scheduled!','success');}

/* ── POST JOB ── */
var _editJid=null;
function openPostJob(jid){
  _editJid=jid||null;var j=jid?ST.jobs.find(function(x){return x.id===jid}):null;var phys=j?j.phys||[]:[];
  var chips=PHYS.map(function(d){return '<span class="chip'+(phys.indexOf(d)>=0?' sel':'')+'" onclick="this.classList.toggle(\'sel\')">'+d+'</span>'}).join('');
  showModal('md-lg','<div class="md-h"><div class="md-t">'+(jid?'Edit Job':'Post New Job')+'</div><button class="md-x" onclick="closeModal()">&times;</button></div><div class="md-b"><div class="al al-br">&#9855; Physical demands, travel, and accommodation contact are ADA-required.</div><div class="frow"><div class="fg"><label class="fl">Job Title <span class="req">*</span></label><input class="fi" id="pj-title" value="'+esc(j?j.title:'')+'"></div><div class="fg"><label class="fl">Company <span class="req">*</span></label><input class="fi" id="pj-co" value="'+esc(j?j.company:(ST.user.companyName||''))+'"></div></div><div class="frow3"><div class="fg"><label class="fl">Location <span class="req">*</span></label><select class="fi fsel" id="pj-loc"><option value="">Select</option>'+STATES.map(function(s){return '<option '+(j&&j.location===s?'selected':'')+'>'+s+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Work Mode</label><select class="fi fsel" id="pj-wm">'+WMODES.map(function(m){return '<option '+(j&&j.wm===m?'selected':'')+'>'+m+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Job Type</label><select class="fi fsel" id="pj-jt">'+JTYPES.map(function(t){return '<option '+(j&&j.jt===t?'selected':'')+'>'+t+'</option>'}).join('')+'</select></div></div><div class="fg"><label class="fl">Salary (optional)</label><input class="fi" id="pj-sal" placeholder="e.g. $70,000–$90,000/yr" value="'+esc(j?j.sal:'')+'"></div><div class="fg"><label class="fl">Description <span class="req">*</span></label><textarea class="fi ftxt" id="pj-desc" rows="5" placeholder="Describe responsibilities, team...">'+esc(j?j.desc:'')+'</textarea></div><div class="fg"><label class="fl">Requirements <span class="req">*</span></label><textarea class="fi ftxt" id="pj-reqs" rows="4" placeholder="Skills, experience, education...">'+esc(j?j.reqs:'')+'</textarea></div><hr style="border:none;border-top:1px solid var(--sand)"><div style="font-weight:700;font-size:15px;color:var(--bark);margin-bottom:10px">&#9855; ADA-Required Disclosures</div><div class="fg"><label class="fl">Physical Demands (select all that apply)</label><div class="chips" id="phys-chips">'+chips+'</div></div><div class="frow"><div><label class="cb-row"><input type="checkbox" id="pj-travel" '+(j&&j.travel?'checked':'')+'><span style="font-weight:700;font-size:13px">Travel is required</span></label><div class="fg"><label class="fl">Travel Details</label><textarea class="fi" id="pj-travdet" rows="3" placeholder="Frequency, destinations...">'+esc(j?j.travelDetails:'')+'</textarea></div></div><div class="fg"><label class="fl">Accommodations Offered</label><textarea class="fi" id="pj-accomm" rows="3" placeholder="Flexible schedule, screen reader...">'+esc(j?j.accomm:'')+'</textarea></div></div><div class="fg"><label class="fl">Accommodation Contact Email <span class="req">*</span></label><input class="fi" type="email" id="pj-email" placeholder="accessibility@company.com" value="'+esc(j?j.accommEmail:(ST.user.email||''))+'"></div><div style="display:flex;gap:8px"><button class="btn btn-p btn-lg" onclick="saveJob()">'+(jid?'Save Changes':'Post Job')+'</button><button class="btn btn-gh" onclick="closeModal()">Cancel</button></div></div>');
}
function saveJob(){var title=(document.getElementById('pj-title')||{}).value||'';var co=(document.getElementById('pj-co')||{}).value||'';var loc=(document.getElementById('pj-loc')||{}).value||'';var desc=(document.getElementById('pj-desc')||{}).value||'';var reqs=(document.getElementById('pj-reqs')||{}).value||'';var email=(document.getElementById('pj-email')||{}).value||'';if(!title||!co||!loc||desc.length<20||!reqs||!email){toast('Fill all required fields.','error');return;}var selChips=Array.from(document.querySelectorAll('#phys-chips .chip.sel')).map(function(c){return c.textContent});var j={id:_editJid||uid(),empId:ST.user.id,employerName:ST.user.name,coLogo:ST.user.companyLogo||null,title:title,company:co,location:loc,wm:(document.getElementById('pj-wm')||{}).value||'On-site',jt:(document.getElementById('pj-jt')||{}).value||'Full-time',sal:(document.getElementById('pj-sal')||{}).value||'',desc:desc,reqs:reqs,phys:selChips,travel:!!((document.getElementById('pj-travel')||{}).checked),travelDetails:(document.getElementById('pj-travdet')||{}).value||'',accomm:(document.getElementById('pj-accomm')||{}).value||'',accommEmail:email,status:'active',createdAt:_editJid?(ST.jobs.find(function(x){return x.id===_editJid})||{}).createdAt||Date.now():Date.now()};if(_editJid){ST.jobs=ST.jobs.map(function(x){return x.id===_editJid?j:x})}else{ST.jobs.unshift(j)}sSet('ah_jobs',ST.jobs);closeModal();toast(_editJid?'Job updated!':'Job posted!','success');renderPage();}

/* ── SETTINGS ── */
function renderSettings(){
  var u=ST.user,tabs2=[{id:'profile',l:'Profile'},{id:'security',l:'Security'}];
  if(u.role==='applicant'){tabs2.push({id:'experience',l:'Experience & Skills'},{id:'qualifications',l:'Education & Certs'},{id:'additional',l:'Additional Info'},{id:'visibility',l:'Visibility'});}
  else tabs2.push({id:'company',l:'Company'});
  tabs2.push({id:'account',l:'Account'});
  var tabHtml='<div class="tabs">'+tabs2.map(function(t){return '<button class="tab'+(ST.settingsTab===t.id?' act':'')+'" onclick="ST.settingsTab=\''+t.id+'\';renderPage()">'+t.l+'</button>'}).join('')+'</div>';
  var c='';
  if(ST.settingsTab==='profile')c=renderProfileTab(u);
  else if(ST.settingsTab==='security')c=renderSecurityTab();
  else if(ST.settingsTab==='experience')c=renderExpTab(u);
  else if(ST.settingsTab==='qualifications')c=renderQualTab(u);
  else if(ST.settingsTab==='additional')c=renderAddlTab(u);
  else if(ST.settingsTab==='visibility')c=renderVisTab(u);
  else if(ST.settingsTab==='company')c=renderCompanyTab(u);
  else if(ST.settingsTab==='account')c=renderAccountTab(u);
  return '<div class="page"><div style="font-size:20px;font-weight:700;color:var(--bark);margin-bottom:20px">Account Settings</div>'+tabHtml+c+'</div>';
}
function renderProfileTab(u){return '<div style="max-width:560px"><div class="card"><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="av-wr">'+avHTML(u.avatarUrl,u.name||u.email,76)+'<div class="av-ed" onclick="document.getElementById(\'av-inp\').click()">&#9998;</div></div><div><div style="font-weight:700;font-size:17px;color:var(--bark)">'+esc(u.name||u.email)+'</div><div style="font-size:13px;color:var(--cara)">'+esc(u.email)+'</div><div style="margin-top:5px"><span class="badge '+(u.role==='employer'?'b-br':'b-tn')+'">'+(u.role==='employer'?'Employer':'Applicant')+'</span></div><button class="btn btn-gh btn-sm" style="margin-top:8px" onclick="document.getElementById(\'av-inp\').click()">Change Photo (max 5MB)</button></div></div><input type="file" id="av-inp" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)"><div class="fg"><label class="fl">Full Name</label><input class="fi" id="pf-name" value="'+esc(u.name||'')+'"></div><div class="fg"><label class="fl">Email</label><input class="fi" value="'+esc(u.email)+'" disabled style="background:var(--parch);color:var(--cara)"><div class="fhint">Email cannot be changed.</div></div><div class="frow"><div class="fg"><label class="fl">Phone (optional)</label><input class="fi" type="tel" id="pf-phone" value="'+esc(u.phone||'')+'"></div><div class="fg"><label class="fl">Location (optional)</label><input class="fi" id="pf-loc" value="'+esc(u.profileLocation||'')+'" placeholder="City, State"></div></div><div class="fg"><label class="fl">Language Preference</label><select class="fi fsel" id="pf-lang">'+LANGS.map(function(l){return '<option '+(u.language===l?'selected':'')+'>'+l+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Bio (optional)</label><textarea class="fi ftxt" id="pf-bio" rows="3" placeholder="Brief introduction...">'+esc(u.bio||'')+'</textarea></div><button class="btn btn-p" onclick="saveProfile()">Save Changes</button></div></div>';}
function handleAvatarUpload(inp){var file=inp.files&&inp.files[0];if(!file)return;if(file.size>5*1024*1024){toast('Max 5MB.','error');return;}var rd=new FileReader();rd.onload=function(e){ST.user.avatarUrl=e.target.result;saveUserData();toast('Photo updated!','success');renderPage()};rd.readAsDataURL(file);}
function saveProfile(){ST.user.name=(document.getElementById('pf-name')||{}).value||ST.user.name;ST.user.phone=(document.getElementById('pf-phone')||{}).value||'';ST.user.profileLocation=(document.getElementById('pf-loc')||{}).value||'';ST.user.language=(document.getElementById('pf-lang')||{}).value||'English';ST.user.bio=(document.getElementById('pf-bio')||{}).value||'';saveUserData();toast('Saved!','success');renderPage();}
function saveUserData(){sSet('ah_user',ST.user);var all=sGet('ah_users')||[];var idx=all.findIndex(function(u){return u.id===ST.user.id});if(idx>=0)all[idx]=ST.user;else all.push(ST.user);sSet('ah_users',all);}
function renderSecurityTab(){return '<div style="max-width:480px"><div class="card"><div style="font-weight:700;font-size:16px;color:var(--bark);margin-bottom:16px">Change Password</div><div class="fg"><label class="fl">Current Password <span class="req">*</span></label><input class="fi" type="password" id="pw-cur"></div><div class="fg"><label class="fl">New Password <span class="req">*</span></label><input class="fi" type="password" id="pw-new" oninput="updatePwBar()"><div class="pw-bar" id="pw-bar"></div><div id="pw-lbl" class="fhint"></div></div><div class="fg"><label class="fl">Confirm New Password <span class="req">*</span></label><input class="fi" type="password" id="pw-con"></div><label class="cb-row"><input type="checkbox" onchange="toggleShowPw(this)"><span style="font-size:13px">Show passwords</span></label><button class="btn btn-p" onclick="changePw()" style="margin-top:10px">Update Password</button></div></div>';}
function updatePwBar(){var pw=(document.getElementById('pw-new')||{}).value||'';var r=pwStr(pw);var bar=document.getElementById('pw-bar');var lbl=document.getElementById('pw-lbl');if(bar)bar.style.background='linear-gradient(90deg,'+r.c+' '+(r.s*20)+'%,var(--sand) '+(r.s*20)+'%)';if(lbl){lbl.textContent=r.l;lbl.style.color=r.c}}
function toggleShowPw(cb){['pw-cur','pw-new','pw-con'].forEach(function(id){var el=document.getElementById(id);if(el)el.type=cb.checked?'text':'password'})}
function changePw(){var cur=(document.getElementById('pw-cur')||{}).value||'';var nw=(document.getElementById('pw-new')||{}).value||'';var con=(document.getElementById('pw-con')||{}).value||'';if(ST.user.password!==btoa(ST.user.email+cur)){toast('Current password incorrect.','error');return;}if(nw.length<8){toast('Min 8 characters.','error');return;}if(nw!==con){toast("Passwords don't match.",'error');return;}ST.user.password=btoa(ST.user.email+nw);saveUserData();toast('Password changed!','success');}
function renderExpTab(u){var exp=sGet('experience_'+u.id)||[];var skills=sGet('skills_'+u.id)||[];var eH=exp.map(function(e,i){return '<div class="edu-c"><button class="edu-rm" onclick="delExp('+i+')">×</button><div class="frow"><div class="fg"><label class="fl">Job Title</label><input class="fi" value="'+esc(e.title||'')+'" onchange="updExp('+i+',\'title\',this.value)"></div><div class="fg"><label class="fl">Company</label><input class="fi" value="'+esc(e.company||'')+'" onchange="updExp('+i+',\'company\',this.value)"></div></div><div class="frow"><div class="fg"><label class="fl">Type</label><select class="fi fsel" onchange="updExp('+i+',\'etype\',this.value)">'+JTYPES.map(function(t){return '<option '+(e.etype===t?'selected':'')+'>'+t+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Location</label><input class="fi" value="'+esc(e.loc||'')+'" onchange="updExp('+i+',\'loc\',this.value)"></div></div><div class="frow"><div class="fg"><label class="fl">Start Date</label><input class="fi" placeholder="MM/YYYY" value="'+esc(e.startDate||'')+'" onchange="updExp('+i+',\'startDate\',this.value)"></div><div class="fg"><label class="fl">End Date</label><input class="fi" placeholder="MM/YYYY" value="'+esc(e.endDate||'')+'" '+(e.current?'disabled':'')+' onchange="updExp('+i+',\'endDate\',this.value)"></div></div><label class="cb-row"><input type="checkbox" '+(e.current?'checked':'')+' onchange="updExp('+i+',\'current\',this.checked)"><span style="font-size:13px">Currently work here</span></label><div class="fg"><label class="fl">Description</label><textarea class="fi" rows="3" onchange="updExp('+i+',\'desc\',this.value)">'+esc(e.desc||'')+'</textarea></div></div>'}).join('');

return '<div style="max-width:720px;display:flex;flex-direction:column;gap:14px"><div class="card"><div style="font-weight:700;font-size:16px;color:var(--bark);margin-bottom:12px">Additional Information</div><div class="fg"><label class="fl">Additional Information (optional)</label><textarea class="fi ftxt" id="addl-text" rows="5" placeholder="Volunteer work, hobbies, causes...">'+esc(d.addl||'')+'</textarea></div></div><div class="card"><div style="font-weight:700;font-size:16px;color:var(--bark);margin-bottom:12px">Military Service (optional)</div><label class="cb-row"><input type="checkbox" id="mil-served" '+(mil.served?'checked':'')+' onchange="var s=document.getElementById(\'mil-section\');s.style.display=this.checked?\'block\':\'none\'"><span style="font-weight:700;font-size:13px">I have served in the U.S. military</span></label><div id="mil-section" style="display:'+(mil.served?'block':'none')+';margin-top:12px"><div class="frow"><div class="fg"><label class="fl">Branch</label><select class="fi fsel" id="mil-branch">'+BRANCHES.map(function(b){return '<option '+(mil.branch===b?'selected':'')+'>'+b+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Rank</label><input class="fi" id="mil-rank" value="'+esc(mil.rank||'')+'" placeholder="e.g. Sergeant E-5"></div></div><div class="frow"><div class="fg"><label class="fl">Start Year</label><input class="fi" id="mil-start" value="'+esc(mil.start||'')+'"></div><div class="fg"><label class="fl">End Year</label><input class="fi" id="mil-end" value="'+esc(mil.end||'')+'" placeholder="e.g. 2018 or Active"></div></div><div class="fg" style="margin-top:6px"><label class="fl">Notes / Specialization</label><textarea class="fi" id="mil-notes" rows="3">'+esc(mil.notes||'')+'</textarea></div></div></div><div class="card"><div class="sec-h"><div style="font-weight:700;font-size:16px;color:var(--bark)">Awards &amp; Honors (optional)</div><button class="btn btn-o btn-sm" onclick="addAward()">+ Add</button></div>'+(awards.length?aH:'<div style="text-align:center;padding:12px;color:var(--cara);font-size:13px">No awards added.</div>')+'</div><div class="card"><div class="sec-h"><div style="font-weight:700;font-size:16px;color:var(--bark)">Publications (optional)</div><button class="btn btn-o btn-sm" onclick="addPub()">+ Add</button></div>'+(pubs.length?pH:'<div style="text-align:center;padding:12px;color:var(--cara);font-size:13px">No publications added.</div>')+'</div><button class="btn btn-p btn-lg" onclick="saveAddl()">Save Additional Info</button></div>';}
function getAddl(){return sGet('additional_'+ST.user.id)||{addl:'',military:{},awards:[],pubs:[]}}
function addAward(){var d=getAddl();d.awards=d.awards||[];d.awards.push({title:'',org:'',yr:'',desc:''});sSet('additional_'+ST.user.id,d);renderPage()}
function delAward(i){var d=getAddl();d.awards.splice(i,1);sSet('additional_'+ST.user.id,d);renderPage()}
function updAward(i,k,v){var d=getAddl();if(d.awards[i])d.awards[i][k]=v;sSet('additional_'+ST.user.id,d)}
function addPub(){var d=getAddl();d.pubs=d.pubs||[];d.pubs.push({title:'',journal:'',yr:'',authors:'',url:''});sSet('additional_'+ST.user.id,d);renderPage()}
function delPub(i){var d=getAddl();d.pubs.splice(i,1);sSet('additional_'+ST.user.id,d);renderPage()}
function updPub(i,k,v){var d=getAddl();if(d.pubs[i])d.pubs[i][k]=v;sSet('additional_'+ST.user.id,d)}
function saveAddl(){var d=getAddl();d.addl=(document.getElementById('addl-text')||{}).value||'';var ms=!!(document.getElementById('mil-served')||{}).checked;d.military={served:ms,branch:ms?((document.getElementById('mil-branch')||{}).value||''):'',rank:ms?((document.getElementById('mil-rank')||{}).value||''):'',start:ms?((document.getElementById('mil-start')||{}).value||''):'',end:ms?((document.getElementById('mil-end')||{}).value||''):'',notes:ms?((document.getElementById('mil-notes')||{}).value||''):''};sSet('additional_'+ST.user.id,d);toast('Saved!','success');}
function renderVisTab(u){var vis=u.visibility||'all';var opts=[{id:'all',ic:'&#127760;',t:'All Employers Can Find Me',d:'Discoverable by any ADA-compliant employer. Best for active job seekers.'},{id:'applied',ic:'&#128274;',t:'Only Employers I\'ve Applied To',d:'Only employers whose jobs you\'ve applied to can view your profile.'},{id:'hidden',ic:'&#128065;',t:'Profile Hidden',d:'Not visible to any employer. You can still apply to jobs.'}];return '<div style="max-width:560px"><div class="card"><div style="font-weight:700;font-size:16px;color:var(--bark);margin-bottom:6px">Profile Visibility</div><div style="font-size:13px;color:var(--cara);line-height:1.6;margin-bottom:16px">Your disability status is never shared without explicit consent regardless of this setting.</div>'+opts.map(function(o){return '<div class="vis-op'+(vis===o.id?' sel':'')+'" onclick="setVis(\''+o.id+'\')"><div style="font-size:20px;margin-top:1px">'+o.ic+'</div><div style="flex:1"><h4>'+o.t+'</h4><p>'+o.d+'</p></div><div class="rdot'+(vis===o.id?' sel':'')+'"></div></div>'}).join('')+'<button class="btn btn-p" onclick="saveVis()">Save Visibility</button></div></div>';}
var _visVal='all';function setVis(v){_visVal=v;document.querySelectorAll('.vis-op').forEach(function(el,i){var id=['all','applied','hidden'][i];el.classList.toggle('sel',id===v);var rd=el.querySelector('.rdot');if(rd){rd.classList.toggle('sel',id===v)}})}
function saveVis(){ST.user.visibility=_visVal||ST.user.visibility||'all';saveUserData();toast('Visibility saved!','success');}
function renderCompanyTab(u){return '<div style="max-width:560px"><div class="card"><div style="display:flex;align-items:center;gap:14px;margin-bottom:20px"><div style="position:relative"><div class="logo-co" style="width:70px;height:70px;border-radius:12px">'+(u.companyLogo?'<img src="'+u.companyLogo+'" style="width:100%;height:100%;object-fit:cover">':'&#127968;')+'</div><div class="av-ed" style="border-radius:7px;bottom:-4px;right:-4px" onclick="document.getElementById(\'logo-inp\').click()">&#9998;</div></div><div><div style="font-weight:700;font-size:16px;color:var(--bark)">'+esc(u.companyName||'Your Company')+'</div><button class="btn btn-gh btn-sm" style="margin-top:6px" onclick="document.getElementById(\'logo-inp\').click()">Upload Logo (max 5MB)</button></div></div><input type="file" id="logo-inp" accept="image/*" style="display:none" onchange="handleLogoUpload(this)"><div class="fg"><label class="fl">Company Name</label><input class="fi" id="co-name" value="'+esc(u.companyName||'')+'"></div><div class="frow"><div class="fg"><label class="fl">Company Size</label><select class="fi fsel" id="co-size"><option value="">Select</option>'+['1–10','11–50','51–200','201–500','500+'].map(function(s){return '<option>'+s+' employees</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Website</label><input class="fi" id="co-web" placeholder="https://" value="'+esc(u.website||'')+'"></div></div><div class="fg"><label class="fl">Company Description (optional)</label><textarea class="fi ftxt" id="co-bio" rows="4" placeholder="Mission, culture, values...">'+esc(u.companyBio||'')+'</textarea></div><div class="al al-br">&#9855; ADA &amp; EEO compliance verified at account creation.</div><button class="btn btn-p" onclick="saveCompany()">Save Company Info</button></div></div>';}
function handleLogoUpload(inp){var file=inp.files&&inp.files[0];if(!file)return;if(file.size>5*1024*1024){toast('Max 5MB.','error');return;}var rd=new FileReader();rd.onload=function(e){ST.user.companyLogo=e.target.result;ST.user.avatarUrl=e.target.result;saveUserData();toast('Logo updated!','success');renderPage()};rd.readAsDataURL(file);}
function saveCompany(){ST.user.companyName=(document.getElementById('co-name')||{}).value||ST.user.companyName;ST.user.companySize=(document.getElementById('co-size')||{}).value||'';ST.user.website=(document.getElementById('co-web')||{}).value||'';ST.user.companyBio=(document.getElementById('co-bio')||{}).value||'';saveUserData();toast('Saved!','success');renderPage();}
function renderAccountTab(u){return '<div style="max-width:520px;display:flex;flex-direction:column;gap:14px"><div class="card"><div style="font-weight:700;font-size:16px;color:var(--bark);margin-bottom:10px">Sync Contacts</div><div style="font-size:13px;color:var(--cara);line-height:1.6;margin-bottom:12px">Connect your address book to find colleagues on AccessHire. We never store or share contacts.</div><button class="btn btn-o" onclick="toast(\'Contacts synced! (Demo only)\',\'success\')">Sync Contacts</button></div><div class="card" style="border:2px solid rgba(192,57,43,.2)"><div style="font-weight:700;font-size:16px;color:var(--rust);margin-bottom:8px">Delete Account</div><div style="font-size:13px;color:var(--cara);line-height:1.6;margin-bottom:14px">Permanent and cannot be undone. All data will be erased.</div><div class="fg"><label class="fl">Type your email to confirm: <strong>'+esc(u.email)+'</strong></label><input class="fi" id="del-confirm" placeholder="'+esc(u.email)+'" style="border-color:rgba(192,57,43,.3)"></div><button class="btn btn-d" onclick="deleteAccount()">Permanently Delete My Account</button></div></div>';}
function deleteAccount(){var conf=(document.getElementById('del-confirm')||{}).value||'';if(conf!==ST.user.email){toast('Type your email exactly.','error');return;}sSet('ah_user',null);var all=(sGet('ah_users')||[]).filter(function(u){return u.id!==ST.user.id});sSet('ah_users',all);ST.user=null;ST.page='home';toast('Account deleted.','info');render();}

/* ── AUTH ── */
var _authCode='',_pendingUser=null;
function showAuth(type){var isLogin=type==='login',isEmp=type==='signup-employer';
var empF=isEmp?'<div class="frow"><div class="fg"><label class="fl">Company Name <span class="req">*</span></label><input class="fi" id="au-coname"></div><div class="fg"><label class="fl">Company Size (optional)</label><select class="fi fsel" id="au-cosize"><option value="">Select</option>'+['1–10','11–50','51–200','201–500','500+'].map(function(s){return '<option>'+s+' employees</option>'}).join('')+'</select></div></div><div class="fg"><label class="fl">Website (optional)</label><input class="fi" id="au-web" placeholder="https://"></div>':'';
var adaF=isEmp?'<div style="background:rgba(139,69,19,.06);border:1.5px solid rgba(139,69,19,.18);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;margin-bottom:12px"><div style="font-weight:700;color:var(--mahog);font-size:13px">Required ADA Attestations</div><label class="cb-row"><input type="checkbox" id="au-ada"><span style="font-size:13px">I attest our organization complies with the ADA and provides reasonable accommodations.</span></label><label class="cb-row"><input type="checkbox" id="au-eeo"><span style="font-size:13px">I attest our organization is an Equal Opportunity Employer.</span></label></div>':'';
var disF=!isLogin&&!isEmp?'<div style="background:var(--parch);border-radius:var(--r);padding:14px;margin-bottom:12px"><div style="font-size:12px;color:var(--cara);margin-bottom:10px;line-height:1.5">Completely optional. Employers cannot access this without your consent.</div><label class="cb-row"><input type="checkbox" id="au-dis"><span style="font-size:13px">I identify as having a disability under the ADA (optional)</span></label></div>':'';
var sflds=!isLogin?'<div class="fg"><label class="fl">'+(isEmp?'Contact Name':'Full Name')+' <span class="req">*</span></label><input class="fi" id="au-name" placeholder="'+(isEmp?'HR Contact':'Your full name')+'"></div><div class="fg"><label class="fl">Phone (optional)</label><input class="fi" type="tel" id="au-phone" placeholder="+1 (555) 000-0000"></div>'+empF:'';
var sw=isLogin?'<div class="divtx"><span>No account? <button style="background:none;border:none;color:var(--sienna);cursor:pointer;font-weight:700;font-size:13px" onclick="showAuth(\'signup-applicant\')">Applicant</button> &middot; <button style="background:none;border:none;color:var(--sienna);cursor:pointer;font-weight:700;font-size:13px" onclick="showAuth(\'signup-employer\')">Employer</button></span></div>':'<div class="divtx"><span>Have an account? <button style="background:none;border:none;color:var(--sienna);cursor:pointer;font-weight:700;font-size:13px" onclick="showAuth(\'login\')">Sign in</button></span></div>';
showModal('md-md','<div class="md-h"><div><div class="md-t">'+(isLogin?'Sign In':isEmp?'Employer Sign Up':'Applicant Sign Up')+'</div><div style="font-size:12px;color:var(--cara);margin-top:3px">'+(isEmp?'ADA-compliant employer access':'ADA-protected platform')+'</div></div><button class="md-x" onclick="closeModal()">&times;</button></div><div class="md-b" id="auth-body">'+sflds+'<div class="fg"><label class="fl">Email <span class="req">*</span></label><input class="fi" type="email" id="au-email" placeholder="you@example.com"></div><div class="fg"><label class="fl">Password <span class="req">*</span></label><div style="position:relative"><input class="fi" type="password" id="au-pw" placeholder="••••••••"'+(isLogin?'':' oninput="upPwB()"')+'><button type="button" onclick="var i=document.getElementById(\'au-pw\');i.type=i.type===\'password\'?\'text\':\'password\'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--cara)">&#128065;</button></div>'+(isLogin?'':'<div class="pw-bar" id="pw-bar2"></div><div id="pw-lbl2" class="fhint"></div>')+'</div>'+(!isLogin?'<div class="fg"><label class="fl">Confirm Password <span class="req">*</span></label><input class="fi" type="password" id="au-pw2" placeholder="••••••••"></div>':'')+''+adaF+disF+'<button class="btn btn-p btn-lg" style="width:100%" onclick="submitAuth(\''+type+'\')">'+(isLogin?'Sign In':'Create Account & Verify Email')+'</button>'+sw+'</div>');}
function upPwB(){var pw=(document.getElementById('au-pw')||{}).value||'';var r=pwStr(pw);var bar=document.getElementById('pw-bar2');var lbl=document.getElementById('pw-lbl2');if(bar)bar.style.background='linear-gradient(90deg,'+r.c+' '+(r.s*20)+'%,var(--sand) '+(r.s*20)+'%)';if(lbl){lbl.textContent=r.l;lbl.style.color=r.c}}
async function submitAuth(type){var isLogin=type==='login',isEmp=type==='signup-employer';var email=(document.getElementById('au-email')||{}).value||'';var pw=(document.getElementById('au-pw')||{}).value||'';if(!email||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){toast('Valid email required.','error');return;}if(!pw){toast('Password required.','error');return;}var all=await dbGetAll('users')||[];
if(isLogin){var found=all.find(function(u){return u.email===email});if(!found){toast('No account found.','error');return;}if(found.password!==await hashPassword(pw)){toast('Incorrect password.','error');return;}ST.user=found;await dbSet('data','user',found);if(found.role==='applicant'){ST.savedIds=await dbGet('data','saved_'+found.id)||[];ST.archivedIds=await dbGet('data','arch_'+found.id)||[];ST.appliedApps=await dbGet('data','applied_'+found.id)||[];ST.invitations=await dbGet('data','inv_'+found.id)||[];ST.interviews=await dbGet('data','intv_'+found.id)||[];}closeModal();ST.page=found.role==='employer'?'dashboard':'jobs';toast('Welcome back, '+(found.name||found.email)+'!','success');render();return;}
if(pw.length<8){toast('Min 8 characters.','error');return;}var pw2=(document.getElementById('au-pw2')||{}).value||'';if(pw!==pw2){toast("Passwords don't match.",'error');return;}var name=(document.getElementById('au-name')||{}).value||'';if(!name){toast('Name required.','error');return;}if(isEmp){var cn=(document.getElementById('au-coname')||{}).value||'';if(!cn){toast('Company name required.','error');return;}var ada=(document.getElementById('au-ada')||{}).checked,eeo=(document.getElementById('au-eeo')||{}).checked;if(!ada||!eeo){toast('Both ADA attestations required.','error');return;}}if(all.some(function(u){return u.email===email})){toast('Email already registered.','error');return;}
var code=String(Math.floor(100000+Math.random()*900000));_authCode=code;_pendingUser={id:uid(),email:email,password:await hashPassword(pw),name:name,phone:(document.getElementById('au-phone')||{}).value||'',role:isEmp?'employer':'applicant',companyName:isEmp?((document.getElementById('au-coname')||{}).value||''):'',companySize:isEmp?((document.getElementById('au-cosize')||{}).value||''):'',website:isEmp?((document.getElementById('au-web')||{}).value||''):'',hasDisability:!isEmp&&!!((document.getElementById('au-dis')||{}).checked),createdAt:Date.now(),avatarUrl:null,visibility:'all'};
document.getElementById('auth-body').innerHTML='<div class="al al-i">Verification code sent to '+esc(email)+'. Demo code: <strong>'+code+'</strong></div><div class="fg"><label class="fl">Enter 6-digit code <span class="req">*</span></label><input class="fi" id="v-code" placeholder="123456" maxlength="6" style="font-size:22px;letter-spacing:.15em;text-align:center"></div><button class="btn btn-p btn-lg" style="width:100%" onclick="verifyCode()">Verify &amp; Create Account</button><button class="btn btn-gh" style="width:100%;margin-top:8px" onclick="showAuth(\''+type+'\')">&#8592; Back</button>';}
function verifyCode(){var v=(document.getElementById('v-code')||{}).value||'';if(v!==_authCode){toast('Incorrect code.','error');return;}var all=sGet('ah_users')||[];all.push(_pendingUser);sSet('ah_users',all);ST.user=_pendingUser;sSet('ah_user',_pendingUser);if(_pendingUser.role==='applicant'){ST.savedIds=[];ST.archivedIds=[];ST.appliedApps=[];ST.invitations=[];ST.interviews=[];}closeModal();ST.page=_pendingUser.role==='employer'?'dashboard':'jobs';toast('Welcome to AccessHire!','success');render();}

/* ── MODAL ── */
function showModal(cls,html){document.getElementById('modal-root').innerHTML='<div class="ov" onclick="closeModalOv(event)"><div class="md '+cls+'">'+html+'</div></div>';}
function closeModal(){document.getElementById('modal-root').innerHTML=''}
function closeModalOv(e){if(e.target.classList.contains('ov'))closeModal()}

boot().catch(function(err){console.error('Failed to boot:',err);render();});
</script>
